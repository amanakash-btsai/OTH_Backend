version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: npm run dev
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      DATABASE_URL: "sqlserver://db;database=eqc_db;user=sa;password=${MSSQL_SA_PASSWORD:-EqcAdmin!2024};encrypt=false;trustServerCertificate=true"
      REDIS_URL: "redis://redis:6379"
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mcr.microsoft.com/azure-sql-edge:latest
    platform: linux/amd64
    ports:
      - '1433:1433'
    environment:
      ACCEPT_EULA: 'Y'
      MSSQL_SA_PASSWORD: '${MSSQL_SA_PASSWORD:-EqcAdmin!2024}'
      MSSQL_PID: 'Developer'
    volumes:
      - sql_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P "${MSSQL_SA_PASSWORD:-EqcAdmin!2024}" -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  sql_data:
  redis_data:
